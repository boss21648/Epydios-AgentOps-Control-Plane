apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: mtls-bearer-evidence
spec:
  providerType: EvidenceProvider
  providerId: mtls-bearer-evidence-provider
  contractVersion: v1alpha1
  endpoint:
    url: https://mtls-bearer-provider.epydios-system.svc.cluster.local:8443
    timeoutSeconds: 5
  auth:
    mode: MTLSAndBearerTokenSecret
    bearerTokenSecretRef:
      name: mtls-bearer-client-token
      key: token
    clientTLSSecretRef:
      name: epydios-controller-mtls-client
    caSecretRef:
      name: epydios-provider-ca
  selection:
    enabled: false
    priority: 1
  advertisedCapabilities:
    - evidence.record
    - evidence.finalize_bundle
