apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: m10-mtls-profile
spec:
  providerType: ProfileResolver
  providerId: m10-mtls-profile-provider
  contractVersion: v1alpha1
  endpoint:
    url: https://m10-mtls-profile-provider.epydios-system.svc.cluster.local:8443
    timeoutSeconds: 5
  auth:
    mode: MTLS
    clientTLSSecretRef:
      name: m10-mtls-controller-client
    caSecretRef:
      name: m10-mtls-provider-ca
  selection:
    enabled: false
    priority: 1
  advertisedCapabilities:
    - profile.resolve

