apiVersion: apps/v1
kind: Deployment
metadata:
  name: m10-mtls-policy-provider
  labels:
    app.kubernetes.io/name: m10-mtls-policy-provider
    app.kubernetes.io/component: provider
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: m10-mtls-policy-provider
      app.kubernetes.io/component: provider
      app.kubernetes.io/part-of: epydios-ai-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: m10-mtls-policy-provider
        app.kubernetes.io/component: provider
        app.kubernetes.io/part-of: epydios-ai-control-plane
    spec:
      serviceAccountName: m10-mtls-provider
      containers:
        - name: mtls-provider
          image: ghcr.io/epydios/epydios-mtls-capabilities-provider:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - -listen=:8443
            - -provider-type=PolicyProvider
            - -provider-id=m10-mtls-policy-provider
            - -provider-version=0.1.0
            - -contract-version=v1alpha1
            - -tls-cert-file=/tls/tls.crt
            - -tls-key-file=/tls/tls.key
            - -client-ca-file=/tls/ca.crt
            - -require-bearer=false
          ports:
            - containerPort: 8443
              name: https
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: server-tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: server-tls
          secret:
            secretName: m10-mtls-server-tls

