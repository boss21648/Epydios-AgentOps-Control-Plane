apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: m10-bearer-evidence
spec:
  providerType: EvidenceProvider
  providerId: m10-bearer-evidence
  contractVersion: v1alpha1
  endpoint:
    url: http://epydios-oss-evidence-provider.epydios-system.svc.cluster.local:8080
    timeoutSeconds: 5
  auth:
    mode: BearerTokenSecret
    bearerTokenSecretRef:
      name: m10-bearer-auth
      key: token
  selection:
    enabled: false
    priority: 1
  advertisedCapabilities:
    - evidence.record
    - evidence.finalize_bundle

