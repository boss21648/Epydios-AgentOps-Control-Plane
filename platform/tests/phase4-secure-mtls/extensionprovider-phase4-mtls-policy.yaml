apiVersion: controlplane.epydios.ai/v1alpha1
kind: ExtensionProvider
metadata:
  name: phase4-mtls-policy
spec:
  providerType: PolicyProvider
  providerId: phase4-mtls-policy-provider
  contractVersion: v1alpha1
  endpoint:
    url: https://phase4-mtls-policy-provider.epydios-system.svc.cluster.local:8443
    timeoutSeconds: 5
  auth:
    mode: MTLS
    clientTLSSecretRef:
      name: epydios-controller-mtls-client
    caSecretRef:
      name: epydios-provider-ca
  selection:
    enabled: true
    priority: 220
  advertisedCapabilities:
    - policy.evaluate
    - policy.validate_bundle
