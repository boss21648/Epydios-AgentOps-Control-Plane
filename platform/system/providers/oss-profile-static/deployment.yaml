apiVersion: apps/v1
kind: Deployment
metadata:
  name: oss-profile-static-resolver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oss-profile-static-resolver
      app.kubernetes.io/component: provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oss-profile-static-resolver
        app.kubernetes.io/component: provider
        app.kubernetes.io/part-of: epydios-ai-control-plane
    spec:
      serviceAccountName: oss-profile-static-resolver
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: profile-resolver
          image: ghcr.io/epydios/epydios-oss-profile-static-resolver:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - -listen=:8080
            - -config=/config/config.json
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: oss-profile-static-resolver-config

