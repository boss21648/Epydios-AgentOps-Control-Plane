apiVersion: apps/v1
kind: Deployment
metadata:
  name: extension-provider-registry-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: extension-provider-registry-controller
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: extension-provider-registry-controller
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: epydios-ai-control-plane
    spec:
      serviceAccountName: extension-provider-registry-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/epydios/epydios-extension-provider-registry-controller:0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect=false
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

