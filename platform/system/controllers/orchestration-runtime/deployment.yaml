apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestration-runtime
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestration-runtime
        app.kubernetes.io/component: runtime
        app.kubernetes.io/part-of: epydios-ai-control-plane
    spec:
      serviceAccountName: orchestration-runtime
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime
          image: ghcr.io/epydios/epydios-control-plane-runtime:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --listen=:8080
            - --namespace=epydios-system
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: epydios-postgres-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: aios_core
            - name: POSTGRES_SSLMODE
              value: disable
            - name: AUTHN_ENABLED
              value: "false"
            - name: AUTHN_ISSUER
              value: ""
            - name: AUTHN_AUDIENCE
              value: ""
            - name: AUTHN_JWKS_URL
              value: ""
            - name: AUTHN_JWKS_CACHE_TTL
              value: "5m"
            - name: AUTHN_ROLE_CLAIM
              value: roles
            - name: AUTHN_CLIENT_ID_CLAIM
              value: client_id
            - name: AUTHN_TENANT_CLAIM
              value: tenant_id
            - name: AUTHN_PROJECT_CLAIM
              value: project_id
            - name: AUTHZ_CREATE_ROLES
              value: runtime.admin,runtime.run.create
            - name: AUTHZ_READ_ROLES
              value: runtime.admin,runtime.run.read
            - name: AUTHZ_ALLOWED_CLIENT_IDS
              value: ""
            - name: AUTHZ_ROLE_PERMISSION_MAPPINGS_JSON
              value: ""
            - name: AUTHZ_POLICY_MATRIX_JSON
              value: ""
            - name: AUTHZ_POLICY_MATRIX_REQUIRED
              value: "false"
            - name: AUTHZ_REQUIRE_POLICY_GRANT
              value: "false"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: epydios-postgres-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: epydios-postgres-app
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
