apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: epydios-dev
servers: 1
agents: 1
ports:
  - port: 8080:80@loadbalancer
  - port: 8443:443@loadbalancer
options:
  k3d:
    wait: true
    timeout: "120s"
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*

