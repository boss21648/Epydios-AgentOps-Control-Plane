apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orchestration-runtime
  labels:
    app.kubernetes.io/name: orchestration-runtime
    app.kubernetes.io/component: hardening
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  namespaceSelector:
    matchNames:
      - epydios-system
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestration-runtime
      app.kubernetes.io/component: runtime
      app.kubernetes.io/part-of: epydios-ai-control-plane
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
