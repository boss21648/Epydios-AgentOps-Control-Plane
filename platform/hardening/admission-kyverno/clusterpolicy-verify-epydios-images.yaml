apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: epydios-verify-signed-images
  annotations:
    policies.kyverno.io/title: Verify Epydios Signed Images
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-epydios-ghcr-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - epydios-system
      verifyImages:
        - imageReferences:
            - ghcr.io/epydios/*
          required: true
          mutateDigest: false
          attestors:
            - count: 1
              entries:
                - keyless:
                    issuer: https://token.actions.githubusercontent.com
                    subjectRegExp: ^https://github.com/epydios/epydios-ai-control-plane/.github/workflows/release-images-ghcr.yml@refs/tags/.+$
                    rekor:
                      url: https://rekor.sigstore.dev
