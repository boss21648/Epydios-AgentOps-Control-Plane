apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epydios-provider-ingress
  labels:
    app.kubernetes.io/name: epydios-provider-ingress
    app.kubernetes.io/component: hardening
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: provider
      app.kubernetes.io/part-of: epydios-ai-control-plane
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: epydios-system
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - controller
                  - runtime
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
