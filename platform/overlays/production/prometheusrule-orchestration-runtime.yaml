apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: orchestration-runtime
  labels:
    app.kubernetes.io/name: orchestration-runtime
    app.kubernetes.io/component: hardening
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  groups:
    - name: epydios.runtime.rules
      rules:
        - alert: EpydiosOrchestrationRuntimeUnavailable
          expr: kube_deployment_status_replicas_available{namespace="epydios-system",deployment="orchestration-runtime"} < 2
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Orchestration runtime availability below HA threshold"
            description: "Deployment epydios-system/orchestration-runtime has fewer than 2 available replicas for over 10 minutes."
        - alert: EpydiosOrchestrationRuntimeCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="epydios-system",container="runtime"}[15m]) > 3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Orchestration runtime restart rate is high"
            description: "Runtime container restarted more than 3 times in 15 minutes."
