apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orchestration-runtime
  labels:
    app.kubernetes.io/name: orchestration-runtime
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  parentRefs:
    - name: epydios-shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - runtime.epydios.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1alpha1/runtime
      backendRefs:
        - name: orchestration-runtime
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /healthz
      backendRefs:
        - name: orchestration-runtime
          port: 8080
