apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: epydios-runtime-ingress
  labels:
    app.kubernetes.io/name: orchestration-runtime
    app.kubernetes.io/component: hardening
    app.kubernetes.io/part-of: epydios-ai-control-plane
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orchestration-runtime
      app.kubernetes.io/component: runtime
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: epydios-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8080
