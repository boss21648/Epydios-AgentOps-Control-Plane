apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: epydios-platform
  source:
    repoURL: https://github.com/argoproj/argo-rollouts.git
    targetRevision: dd8a4db3d5d053a90656490b648069bf63881133
    path: manifests/cluster-install
    kustomize:
      namespace: argo-rollouts
      images:
        - quay.io/argoproj/argo-rollouts:v1.8.4
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
