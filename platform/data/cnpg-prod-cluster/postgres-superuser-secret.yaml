apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: epydios-postgres-superuser
  labels:
    app.kubernetes.io/part-of: epydios-ai-control-plane
    app.kubernetes.io/component: postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: epydios-platform-secrets
  target:
    name: epydios-postgres-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: epydios/prod/postgres/superuser
        property: username
    - secretKey: password
      remoteRef:
        key: epydios/prod/postgres/superuser
        property: password
