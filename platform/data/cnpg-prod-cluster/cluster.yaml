apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: epydios-postgres
  labels:
    app.kubernetes.io/part-of: epydios-ai-control-plane
    app.kubernetes.io/component: postgres
spec:
  instances: 3
  enableSuperuserAccess: false
  superuserSecret:
    name: epydios-postgres-superuser
  bootstrap:
    initdb:
      database: aios_core
      owner: aios_app
      secret:
        name: epydios-postgres-app
  storage:
    size: 100Gi
  walStorage:
    size: 50Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  backup:
    barmanObjectStore:
      destinationPath: s3://epydios-control-plane-prod/epydios-postgres
      endpointURL: https://s3.amazonaws.com
      s3Credentials:
        accessKeyId:
          name: epydios-postgres-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: epydios-postgres-backup-s3
          key: SECRET_ACCESS_KEY
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: true
