apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: epydios-postgres
  labels:
    app.kubernetes.io/part-of: epydios-ai-control-plane
    app.kubernetes.io/component: postgres
spec:
  instances: 1
  enableSuperuserAccess: true
  superuserSecret:
    name: epydios-postgres-superuser
  bootstrap:
    initdb:
      database: aios_core
      owner: aios_app
      secret:
        name: epydios-postgres-app
  storage:
    size: 2Gi

