apiVersion: v1
kind: ConfigMap
metadata:
  name: epydios-postgres-smoketest-sql
data:
  smoketest.sql: |
    CREATE TABLE IF NOT EXISTS epydios_smoketest (
      id BIGSERIAL PRIMARY KEY,
      note TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO epydios_smoketest (note)
    VALUES ('epydios cnpg smoketest')
    ON CONFLICT DO NOTHING;

    SELECT COUNT(*) AS rows_present FROM epydios_smoketest;

