apiVersion: batch/v1
kind: Job
metadata:
  name: epydios-postgres-smoketest
  labels:
    app.kubernetes.io/part-of: epydios-ai-control-plane
    app.kubernetes.io/component: smoketest
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: epydios-ai-control-plane
        app.kubernetes.io/component: smoketest
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              export PGPASSWORD="${POSTGRES_PASSWORD}"
              echo "Waiting for Postgres endpoint ${POSTGRES_HOST}:${POSTGRES_PORT}..."
              until psql \
                -h "${POSTGRES_HOST}" \
                -p "${POSTGRES_PORT}" \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                -c "SELECT 1" >/dev/null 2>&1; do
                sleep 5
              done

              psql \
                -v ON_ERROR_STOP=1 \
                -h "${POSTGRES_HOST}" \
                -p "${POSTGRES_PORT}" \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                -f /sql/smoketest.sql
          env:
            - name: POSTGRES_HOST
              value: epydios-postgres-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: aios_core
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: epydios-postgres-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: epydios-postgres-app
                  key: password
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      volumes:
        - name: sql
          configMap:
            name: epydios-postgres-smoketest-sql
