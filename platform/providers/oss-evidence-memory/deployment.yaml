apiVersion: apps/v1
kind: Deployment
metadata:
  name: epydios-oss-evidence-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: epydios-oss-evidence-provider
      app.kubernetes.io/component: provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: epydios-oss-evidence-provider
        app.kubernetes.io/component: provider
        app.kubernetes.io/part-of: epydios-ai-control-plane
    spec:
      serviceAccountName: epydios-oss-evidence-provider
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: evidence-provider
          image: ghcr.io/epydios/epydios-oss-evidence-memory-provider:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - -listen=:8080
            - -config=/config/config.json
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: provider-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: provider-config
          configMap:
            name: epydios-oss-evidence-provider-config

